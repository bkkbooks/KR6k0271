body:
  text: 弘一此本專為初學讀羯磨者而別録寫故凡屬疏之科自非重要故多簡略屬疏之科志記號科目文字依疏寫録凡有前後互異者亦附寫之而用記號以區別但前後稍異者不録凡疏中闕此科文而必須增入乃能連貫者依靈芝別行科文補之旁記先以義門開解初教興本意後造文科釋分齊初釋名目初明體二顯名定體二定體相二明相初依四別並以義求三分廣所以初大分三品二對法相攝分齊四諸部同異二離八相三辨務緣成明緣成相初明聖法能成之法四廣明非相顯成非相二法所被事初制意釋名初列數定體初列數三能秉御僧二定僧體狀二立相所由二定體四法依處起三人法相對三攝用分齊初人初當僧局論四廣顯是非二法二僧尼互作一但心念法初條法二對首心念初條貫其相二條事三衆法心念三條僧四但對首二對法相攝分齊四條界五衆法對首初以羯磨條餘三緣六小衆對首七衆法單白八白二初法二引法通塞九白四二事明塞通相攝二就四緣當局各明通局所以三人四界初一篇為序分後造文科釋分齊次篇下訖懺罪篇為正宗分初以義求相從次第末一篇明雜行流通分後依篇隨相解釋疏文總科如上以下十篇依次別列集法緣成篇第一初衆法羯磨初舉大數用攝諸法初單白二隨法顯相二白二初標釋篇目二對首法初總舉位數三白四二科文隨解初集法二從位顯相初但對首明緣集三心念法初舉二衆法對首二辨緣成壞二列相初但心念二對首心念初具緣辨成初僧位初前舉三衆法心念二明成否相二衆多人法二廣顯緣具三一人法作法具緣初不可分別初稱量前事初引文證初聚落二可分別二法起託處二隨義開之就義解法緣二蘭若初無難三集僧方法初舉二界初作法三道行二有難四僧集約界二隨別釋二自然四水界五應法和合初牒文顯意初人得滿不合訶六簡衆是非二舉相列名二不得滿數應合訶七欲清淨緣初以義分初制意釋名體門三俱非二定緣是非門四得滿得訶八正陳本意三作法成壞門九問事端緒四持説應緣門十答所成法五雜相分別門二從文初與欲去初制意初緣如非案此二科分文二開緣緣如非義二定開制稍有參差今於三作法成壞初顯法羯磨鉤段依第二二持欲成否相初受已是非二是非從文科受欲二轉欲之法三正作三説欲相初説欲儀正加法説儀二顯雜相二明成否相初僧法初依律本文初義説非法相二對首前七非二文初舉非數三心念二義張二各牒隨解有七如文諸界結解篇第二初攝僧界一相是非定相二結解衣界二形體狀界形三結解食界三豎標域四唱方隅初總敘致五集僧法二別初大界初人法二同初結六不受欲初標初緣七加法消文二開二法食兩同八法有無二釋三制九顯失否四相三單法同十結不成五結初標緣起明加結二解二解初緣初依文相解羯磨本初白二正加二重列諸門釋其疑妨二羯磨二戒場初戒場初制開意二內外先後三結解法正加法初相位二結通圍大界法初標緣起二唱三小界初教興所由二相三結二集僧遠近三結三無有標相初緣初結四結解同異二顯標處二解五顯張是非三明非法四羯磨二結解衣界初須結得否二解教興意初標舉結方三結之方法四約界通局結遍否五除結前後初標緣顯示二牒緣加事初結正加法二依法結解二解初制意辨名二列數定體列名總三分自他四院有周缺三結解食界初結淨五法有作否初結二義明護淨六結解差別正作法別二解諸戒受法篇第三初敘引其數初義分初標初標初受三歸二正明初標二釋二受五戒初義分二就文二列初俗二隨文釋義二授法初標初戒德高勝即疏義分中初門義二簡器堪能簡人相即疏義分中二門義二法初三歸誓即疏義分中三門作法延促義二三歸結即疏義分中四門發戒時節義三相即疏義分中五門約相顯持義初就相告令初釋名簡法二餘相二要期立志初以義分三功益之美四受法差降三受八戒五顯其戒相初緣即義分中第四門義初受二法二對文釋二結初列相示出家授戒法三相即義分中第五門義初標舉宗致二明願引二道初明乞度初標緣二隨相解之二乞就文依位分三與法二正辨度人初明僧受初度沙彌二明尼法二大戒初度沙彌初標起初形同法二隨相辨位就位分二法同法初緣二正受法初列十相三明相二列五德三列十數二大戒初標舉衆名初標舉初列數顯相二通局不同二就緣正解二列緣三秉法差別秉法師資約文從事四教被凡聖初能受五藉緣多少緣假衆相初緣初法初顯戒德尊高二所對境二依緣略簡三明心有受託緣顯障四心境會約行事前緣五事成同一初明緣致二事初請師法初敘師資教興所由二修虔敬二安受者所二立法加被加法初請三差教師二可答辭四出衆問法初示其衣鉢初定其思審二正辨問難傍兼十遮二依數列問三定其言議情事無爽結文五白召入衆初緣二正加法初以義引三明其儀相二消文相初難六明乞戒初緣二明諸遮七戒師問和二法正乞正授戒體八正問初緣初列難名示二法初戒緣二問二問遮相二正加三總結和辭初緣初標舉總相三相初止持行相二分文消釋二隨四問結之列相隨相二作持行相初義分初緣初標舉宗本二釋文二相體相二列四相位三總結前二勸以學方初即坐誨約初當相委示二深防制二後起隨行初本師和尚明相攝法師資相攝法二顯事緣有障更須師他請依止二明尼法初標緣二受初標舉總示初乞緣二顯示輕重六相初授下衆法初標緣二乞法緣三分簡位別行通有無二式叉六法二法三召來衆中示名相就緣分別三授大戒法初標緣初明本法初五義初明請師二正受二就僧受法二就文分二教乞戒正受三戒師和白法初緣四正明問難二法初列八重止持三授戒相二列四依三明結付衣藥受淨篇第四初明制畜初受衣初制畜三衣意二明聽畜二受鉢二求財法三明色相初五衆受衣法初明衣緣本制初標章四明衣量二廣分所以五重單相二明受持行護初前後持六條相多少明受法二正從相七長短相二受尼師壇法初制緣起三通塞法八作衣法二法九補治法十護敬受用法此行科文依靈芝重釐訂者録寫四正加受初對首受捨法受衣方法二心念受捨法五失離緣明失受持相初僧衆受三衣初受法初大僧受三衣初安陀會二尼受二衣二捨法二下衆受縵衣二受鬱多羅三受僧伽梨二受鉢法初緣初制意二正加受二論體三辨色四明量五行護二明聽畜初四藥初緣初時藥初緣初觀藥染淨二法二受漿二作法二授者是非授食法受三受七日藥法三明受法自受法四受盡形藥四量時設觀作觀二衣等説淨法初衣説淨法初標緣二金粟淨法二請施主初對首淨法三正加法二心念淨法諸説戒法篇第五初緣二法初僧説戒法初説戒法初僧法初廣法初説戒前法二尼請教法二同犯懺白法二説戒座上法初教誡尼法二略説戒法初緣二告清淨法初識罪二對首説戒法二相三識疑兩露二疑罪三心念説四座上發露法諸衆安居法篇第六初對首初前安居法初明住法初明義門初標緣起二後安居法二對文二心念法二作法三忘成法四及園界二明出界行法初受日出法初約義二就文初緣初衆法二命梵移法二正加法三和護餘緣和僧護法二對首四受出逢難限滿不來五無緣經難不來成敗當日出界逢難經宿諸衆自恣篇第七初標緣初僧法初廣法初明白二作法初僧二對首恣二略恣二差五德二尼三心念法三單白和四正作相諸分衣法篇第八初以義分初明二部僧得施二就文解二明兩部現前施三明時現前四非時現前五明時僧得六非時僧得懺六聚法篇第九初以義顯初引經律釋成兩懺初用僧限齊二消文初緣二捨財二法二二懺對根不同初明捨財初捨財儀式初懺夷二捨心二捨懺所為二懺二篇法初對僧三捨罪三懺第三聚法初前三十四還衣初即座法四懺第四聚法二直付五第五六聚二後墮二對衆多人三對一人雜法住持篇第十初行護流通初明念法二明兩白二明教詮相三作餘食法四師資相攝五諫作止兩犯謹案羯磨疏略科草稿分段隔線原用藍線原用朱圈及原皆用朱茲為便排印一律不用朱藍等色又原稿中亦偶有用藍色者今別以代之大藏經會謹識
